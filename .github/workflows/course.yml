name: Check course

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["24.x", "26.x"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting, linting, and types
        run: |
          npm run format:check
          npm run lint
          npm run typecheck
          npm run links

      - name: Run lessons and reference solutions
        run: npm run course

      - name: Run exercise and project tests
        run: npm test

      - name: Measure project coverage
        if: matrix.node-version == '26.x'
        run: npm run coverage

  portability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run Deno portability smoke test
        run: deno run scripts/portability-smoke.ts

      - name: Run Bun portability smoke test
        run: bun run scripts/portability-smoke.ts
