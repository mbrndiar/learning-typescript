name: Check course

env:
  CAPSTONE_IMPLEMENTATION: solution

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["24.x", "26.x"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting, linting, and types
        run: |
          npm run format:check
          npm run lint
          npm run typecheck:node
          npm run links

      - name: Run lessons and reference solutions
        run: npm run course:node

      - name: Run exercise, project, and capstone tests
        run: npm run test:node

      - name: Measure project and capstone coverage
        if: matrix.node-version == '26.x'
        run: npm run coverage

      - name: Audit Node.js dependencies
        if: matrix.node-version == '26.x'
        run: npm run audit:node

  deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.3
          cache: true

      - name: Run Deno checks
        run: deno task check

  bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run Bun checks
        run: npm run check:bun

  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.3
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run cross-runtime conformance
        run: |
          npm run portability
          deno run scripts/runtime-conformance.ts
          bun run scripts/runtime-conformance.ts
